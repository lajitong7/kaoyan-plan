<style>
:root {
  --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#c9d1d9;
  --dim:#8b949e; --blue:#58a6ff; --green:#3fb950; --orange:#d2991d;
  --red:#f85149; --purple:#bc8cff; --cyan:#39d2c0;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"Microsoft YaHei",sans-serif;line-height:1.7;padding:16px;max-width:960px;margin:0 auto}
.score-row{display:flex;gap:8px;margin:8px 0 16px;flex-wrap:wrap}
.sc{flex:1;min-width:60px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 8px;text-align:center}
.sc .n{font-size:1.5em;font-weight:bold}.sc .l{font-size:0.7em;color:var(--dim)}
.quote-box{background:linear-gradient(135deg,#1a2332,#1a1a2e);border-left:3px solid var(--purple);padding:12px 16px;margin:12px 0;border-radius:0 6px 6px 0;font-style:italic;color:#bc8cff;font-size:0.9em;min-height:44px;transition:opacity .4s}
.quote-box .author{display:block;text-align:right;color:var(--dim);font-size:0.75em;margin-top:4px;font-style:normal}
.progress-wrap{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin:10px 0}
.progress-bar{width:100%;height:6px;background:#21262d;border-radius:3px;overflow:hidden;margin:6px 0}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s;width:0%}
.progress-text{display:flex;justify-content:space-between;font-size:0.8em;color:var(--dim)}
.week{margin:12px 0}
.week-title{background:var(--card);border:1px solid var(--border);border-radius:6px 6px 0 0;padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;font-weight:bold;font-size:0.9em}
.week-title:hover{background:#1c2333}
.week-title .arrow{transition:transform .2s;color:var(--dim);font-size:0.8em}
.week.open .week-title{border-radius:6px 6px 0 0}
.week.open .week-title .arrow{transform:rotate(90deg)}
.week-body{display:none;border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;overflow-x:auto}
.week.open .week-body{display:block}
table{width:100%;border-collapse:collapse;font-size:0.8em;min-width:700px}
th,td{border:1px solid var(--border);padding:7px 8px;text-align:left;vertical-align:top}
th{background:#21262d;color:var(--blue);font-weight:bold;font-size:0.78em}
tr:nth-child(even){background:#0d1117}
.task-row input[type=checkbox]{display:none}
.task-row label{cursor:pointer;display:flex;align-items:flex-start;gap:5px}
.task-row .cb{width:16px;height:16px;min-width:16px;border:2px solid var(--border);border-radius:3px;margin-top:2px;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent}
.task-row input:checked+label .cb{background:var(--green);border-color:var(--green);color:#fff}
.task-row input:checked+label .task-text{text-decoration:line-through;color:var(--dim);opacity:.6}
.today-row{background:#1a2a1a!important}.today-row td:first-child{color:var(--green);font-weight:bold}
.clickable{cursor:pointer;border-bottom:1px dashed transparent;transition:border-color .2s}
.clickable:hover{border-bottom-color:var(--dim)}
.editing input{background:var(--bg);color:var(--text);border:1px solid var(--blue);border-radius:3px;padding:4px 6px;width:95%;font-size:0.9em;font-family:inherit}
.reminder{background:#2a1a1a;border-left:3px solid var(--orange);padding:10px 14px;margin:10px 0;border-radius:0 6px 6px 0;font-size:0.85em}
.reminder strong{color:var(--orange)}
.btn-row{display:flex;gap:6px;margin:14px 0;flex-wrap:wrap}
.btn{padding:7px 14px;border:1px solid var(--border);border-radius:5px;background:var(--card);color:var(--text);cursor:pointer;font-size:0.82em;transition:all .2s}
.btn:hover{background:#1c2333;border-color:#58a6ff}
.btn.danger{color:var(--red)}.btn.danger:hover{border-color:var(--red)}
.legend{font-size:0.75em;color:var(--dim);margin:8px 0}
.legend span{margin-right:12px}
@media(max-width:600px){body{padding:10px}table{font-size:0.7em;min-width:600px}th,td{padding:5px 4px}}
</style>

async function fetchHitokoto(){
  try{

  }catch(e){ return null; }

// ============ 渲染 ============
function render(){
  const container = document.getElementById('weeks');
  let html = '';
  WEEKS.forEach((w,wi)=>{
    const wid = 'w'+wi;
    html += `<div class="week open" id="${wid}"><div class="week-title" onclick="toggleWeek('${wid}')"><span class="arrow">▶</span>${w.title}</div><div class="week-body"><table><tr><th style="width:12%">日期</th><th style="width:27%">数学<span style="color:var(--dim);font-weight:normal"> 1.5h/4h</span></th><th style="width:29%">408<span style="color:var(--dim);font-weight:normal"> 1h/2.5h</span></th><th style="width:22%">英语<span style="color:var(--dim);font-weight:normal"> 0.5h/1h</span></th><th style="width:10%">政治</th></tr>`;
    w.days.forEach((d,di)=>{
      if(!d[0]) return;
      const did = wid+'_d'+di;
      const isToday = d[0].includes(fmtDate(new Date()));
      html += `<tr class="task-row${isToday?' today-row':''}" id="tr_${did}"><td>${d[0]}</td>`;
      for(let i=1;i<=4;i++){
        html += `<td><input type="checkbox" id="${did}_${i}" onchange="onCheck()"><label for="${did}_${i}"><span class="cb">✓</span><span class="task-text clickable" ondblclick="editTask(this,'${did}_${i}')" title="双击编辑">${d[i]||'—'}</span></label></td>`;
      }
      html += '</tr>';
    });
    html += '</table></div></div>';
  });
  container.innerHTML = html;
  restoreAll();
  updateProgress();
}

function toggleWeek(wid){ document.getElementById(wid).classList.toggle('open') }
function expandAll(){ document.querySelectorAll('.week').forEach(w=>w.classList.add('open')) }
function collapseAll(){ document.querySelectorAll('.week').forEach(w=>w.classList.remove('open')) }
function goToday(){
  const tr = document.querySelector('.today-row');
  if(tr){ tr.scrollIntoView({behavior:'smooth',block:'center'}); tr.closest('.week').classList.add('open') }
  else alert('今天没有任务。')
}

const CK = 'ky_checks_v4', TK = 'ky_tasks_v4';
function saveAll(){
  const checks={}, tasks={};
  document.querySelectorAll('input[type=checkbox]').forEach(cb=>{ checks[cb.id]=cb.checked });
  document.querySelectorAll('.task-text').forEach(el=>{
    const cbId = el.getAttribute('ondblclick')?.match(/'([^']+)'/)?.[1];
    if(cbId) tasks[cbId] = el.textContent;
  });
  localStorage.setItem(CK, JSON.stringify(checks));
  localStorage.setItem(TK, JSON.stringify(tasks));
}
function restoreAll(){
  try{
    const checks=JSON.parse(localStorage.getItem(CK)||'{}');
    Object.entries(checks).forEach(([id,v])=>{ const cb=document.getElementById(id); if(cb) cb.checked=v });
    const tasks=JSON.parse(localStorage.getItem(TK)||'{}');
    Object.entries(tasks).forEach(([id,t])=>{
      const el = document.querySelector(`[ondblclick*="${id}"]`);
      if(el && t && t !== '—') el.textContent = t;
    });
  }catch(e){}
}
function onCheck(){ saveAll(); updateProgress() }

function editTask(el, cbId){
  if(el.querySelector('input')) return;
  const old = el.textContent;
  const inp = document.createElement('input');
  inp.value = old;
  inp.style.cssText = 'background:var(--bg);color:var(--text);border:1px solid var(--blue);border-radius:3px;padding:4px 6px;width:95%;font-size:0.85em;font-family:inherit';
  el.textContent = '';
  el.appendChild(inp);
  inp.focus(); inp.select();
  function done(){ const v = inp.value.trim()||old; el.textContent=v; saveAll() }
  inp.addEventListener('blur', done);
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); done() } if(e.key==='Escape'){ el.textContent=old } });
}

const msShown = {};
function updateProgress(){
  const all = document.querySelectorAll('input[type=checkbox]');
  const done = document.querySelectorAll('input[type=checkbox]:checked');
  const total = all.length, count = done.length;
  const pct = total?Math.round(count/total*100):0;
  document.getElementById('done-text').textContent = `已完成 ${count} / ${total} 个任务`;
  document.getElementById('pct-text').textContent = pct+'%';
  document.getElementById('pfill').style.width = pct+'%';
  const rem = document.getElementById('reminder');
  const todayTr = document.querySelector('.today-row');
  if(todayTr){
    const tcs = todayTr.querySelectorAll('input[type=checkbox]');
    const td = todayTr.querySelectorAll('input[type=checkbox]:checked');
    if(td.length < tcs.length){
      rem.style.display='block';
      rem.innerHTML=`<strong>⏰ 今天还有 ${tcs.length-td.length} 项没完成</strong> · 打开墨墨背单词，就现在。`;
    }else{
      rem.style.display='block';
      rem.innerHTML='<strong>✅ 今天全部完成</strong> · 早点休息。';
    }
  }
  const msgs = {
    [Math.floor(total*0.2)]:'🎯 20% · 最难的开头几周已经过去了，数据结构代码应该能看懂了吧。',
    [Math.floor(total*0.4)]:'🎯 40% · DS的线性表/栈/队列/树代码脱稿了吗？墨墨打卡别断。',

const PWD = 'feihan1203H';
const PWD_KEY = 'ky_pwd_ok';
(function(){
  const overlay = document.getElementById('pwd-overlay');
  const main = document.getElementById('main-content');
  const inp = document.getElementById('pwd-input');
  const btn = document.getElementById('pwd-btn');
  const err = document.getElementById('pwd-error');
  function check(){
    if(inp.value === PWD){
      const exp = Date.now() + 86400000;
      localStorage.setItem(PWD_KEY, exp);
      overlay.style.display = 'none';
      main.style.display = 'block';
    } else {
      err.style.display = 'block';
      inp.value = '';
      inp.focus();
    }
  }
  const saved = localStorage.getItem(PWD_KEY);
  if(saved && parseInt(saved) > Date.now()){
    overlay.style.display = 'none';
    main.style.display = 'block';
  }
  btn.addEventListener('click', check);
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') check(); });
})();

render();
